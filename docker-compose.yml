version: "3.9"

services:
  web:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql://postgres:password@db:5432/posdb
      FLASK_ENV: production
    volumes:
      - .:/app
    command: >
      sh -c "flask init-db && gunicorn --bind 0.0.0.0:5000 --workers 2 run:app"

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: posdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d posdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
